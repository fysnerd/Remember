stories:
  # --- Epic 1: Content Capture ---
  - id: S001
    title: YouTube OAuth Integration
    epic: E1
    points: 8
    priority: must_have
    status: not_started
    sprint: 1
    description: |
      Connect YouTube account via OAuth to access liked videos.
      - "Connect YouTube" button triggers Google OAuth
      - Store access_token + refresh_token securely
      - Show connection status and last sync time
    acceptance_criteria:
      - OAuth popup opens with correct scopes
      - Tokens stored encrypted in database
      - Connection status visible in settings
      - Can disconnect and reconnect

  - id: S002
    title: Spotify OAuth Integration
    epic: E1
    points: 8
    priority: must_have
    status: not_started
    sprint: 1
    description: |
      Connect Spotify account via OAuth to access listening history.
      - "Connect Spotify" button triggers Spotify OAuth
      - Store access_token + refresh_token securely
      - Show connection status and last sync time
    acceptance_criteria:
      - OAuth popup opens with correct scopes
      - Tokens stored encrypted in database
      - Connection status visible in settings
      - Can disconnect and reconnect

  - id: S003
    title: YouTube Sync Cron Job
    epic: E1
    points: 5
    priority: must_have
    status: completed
    sprint: 2
    depends_on: [S001]
    description: |
      Background job to fetch new liked videos from YouTube.
      - Runs every 15 minutes
      - Fetches from YouTube Data API (likes playlist)
      - Only processes new videos since last sync
    acceptance_criteria:
      - Cron job runs reliably every 15 min
      - Handles API rate limits gracefully
      - Deduplicates content
      - Updates last_sync_timestamp

  - id: S004
    title: Spotify Sync Cron Job
    epic: E1
    points: 5
    priority: must_have
    status: completed
    sprint: 2
    depends_on: [S002]
    description: |
      Background job to fetch recent podcast episodes from Spotify.
      - Runs every 30 minutes
      - Fetches from Spotify recently-played API
      - Filters for podcast episodes only (not music)
    acceptance_criteria:
      - Cron job runs reliably every 30 min
      - Filters out music tracks
      - Deduplicates content
      - Updates last_sync_timestamp

  # --- Epic 2: Content Processing ---
  - id: S005
    title: YouTube Transcription (youtube-transcript-api)
    epic: E2
    points: 5  # Reduced from 13 - much simpler with youtube-transcript-api
    priority: must_have
    status: completed
    sprint: 2
    depends_on: [S003]
    description: |
      Fetch transcripts for YouTube videos using youtube-transcript-api.
      - Use youtube-transcript-api Python library (FREE)
      - Fallback to yt-dlp + Whisper if no subtitles (rare)
      - Store timestamped transcript in database
    acceptance_criteria:
      - Transcripts fetched for 95%+ of videos
      - Fallback works for videos without subtitles
      - Timestamps preserved
      - Multiple languages supported (EN, FR, ES, DE)

  - id: S005b
    title: Spotify Podcast Transcription (RSS + Whisper)
    epic: E2
    points: 10  # New story
    priority: must_have
    status: completed
    sprint: 3
    depends_on: [S004]
    description: |
      Transcribe Spotify podcasts via RSS feed + Whisper API.
      - Lookup RSS feed using Listen Notes API
      - Download MP3 from RSS feed
      - Send to Whisper API for transcription
      - Handle "Spotify Exclusive" gracefully (unsupported)
    acceptance_criteria:
      - RSS feed found for 80%+ of podcasts
      - Audio downloaded and transcribed
      - Spotify Exclusives marked as "unsupported"
      - Processing time <5min for 1-hour episode

  - id: S006
    title: AI Quiz Generation from Transcripts
    epic: E2
    points: 13
    priority: must_have
    status: completed
    sprint: 3
    depends_on: [S005]
    description: |
      Generate quiz questions from video/podcast transcripts using LLM.
      - Send transcript to GPT-4/Claude
      - Generate 3-5 multiple choice questions
      - Include quality filter (skip non-educational)
    acceptance_criteria:
      - 3-5 questions generated per content
      - Questions are factual and educational
      - User can preview before adding to queue
      - User can regenerate if quality poor

  - id: S007
    title: AI Quiz from Podcast Transcripts
    epic: E2
    points: 3  # Reduced - same logic as S006, just different source
    priority: must_have
    status: completed
    sprint: 3
    depends_on: [S005b, S006]
    description: |
      Apply quiz generation to podcast transcripts.
      - Reuse S006 logic for podcast content
      - Handle longer transcripts (chunk if needed)
    acceptance_criteria:
      - Quiz generation works on podcast transcripts
      - Handles long episodes (>1 hour)
      - Quality filter applied

  # --- Epic 3: Spaced Repetition ---
  - id: S008
    title: Review Session Interface
    epic: E3
    points: 8
    priority: must_have
    status: completed
    sprint: 4
    depends_on: [S006]
    description: |
      Clean, focused UI for quiz review sessions.
      - Full-screen review mode
      - Show question, reveal answer, rate difficulty
      - Progress bar and session summary
    acceptance_criteria:
      - Distraction-free full-screen UI
      - Keyboard shortcuts (Space, 1-4)
      - Progress bar updates
      - Session summary at end

  - id: S009
    title: SM-2 Spaced Repetition Algorithm
    epic: E3
    points: 13
    priority: must_have
    status: completed
    sprint: 4
    depends_on: [S008]
    description: |
      Implement SM-2 algorithm for optimal review scheduling.
      - Calculate next review date based on difficulty rating
      - Intervals: 1d, 3d, 1w, 2w, 1m, 3m
      - Track ease factor per card
    acceptance_criteria:
      - SM-2 algorithm correctly implemented
      - Cards scheduled based on rating
      - New cards introduced gradually (20/day max)
      - Due cards ordered oldest first

  - id: S010
    title: Daily Review Reminders
    epic: E3
    points: 5
    priority: must_have
    status: completed
    sprint: 5
    depends_on: [S009]
    description: |
      Email reminders to encourage daily review habit.
      - Configurable reminder time (default 9am)
      - Shows number of cards due
      - Direct link to review session
    acceptance_criteria:
      - Email sent at configured time
      - Shows card count
      - Can snooze or skip
      - User can disable

  - id: S011
    title: Streak Tracking
    epic: E3
    points: 3
    priority: must_have
    status: completed
    sprint: 5
    depends_on: [S009]
    description: |
      Track consecutive days of review for motivation.
      - Streak counter on dashboard
      - Celebration on milestones (7, 30, 100 days)
      - Longest streak tracked
    acceptance_criteria:
      - Streak increments daily
      - Resets if day missed
      - Milestone celebrations work
      - Longest streak persisted

  # --- Epic 4: Content Library ---
  - id: S012
    title: Content Library List View
    epic: E4
    points: 5
    priority: should_have
    status: completed
    sprint: 5
    description: |
      View all captured content in a browsable list.
      - Grid/list view with thumbnails
      - Shows title, platform, date, card count
      - Pagination
    acceptance_criteria:
      - Content displayed with thumbnails
      - Click to view details
      - Pagination works (20/page)

  - id: S013
    title: Search & Filter
    epic: E4
    points: 8
    priority: should_have
    status: completed
    sprint: 6
    depends_on: [S012]
    description: |
      Search and filter content library.
      - Full-text search on titles + transcripts
      - Filter by platform, date, tags
      - Instant search results
    acceptance_criteria:
      - Search returns relevant results
      - Filters combine correctly
      - Results update as user types

  - id: S014
    title: Auto-Tagging with AI
    epic: E4
    points: 5
    priority: should_have
    status: completed
    sprint: 6
    depends_on: [S006]
    description: |
      Automatically tag content using AI.
      - Generate 3-5 tags per item from transcript
      - Tags editable by user
      - Tag cloud in library
    acceptance_criteria:
      - Tags generated automatically
      - User can edit/delete tags
      - Tags used in filtering

  # --- Epic 5: Export ---
  - id: S015
    title: Markdown Export
    epic: E5
    points: 5
    priority: should_have
    status: completed
    sprint: 6
    description: |
      Export content as Markdown files.
      - Single item or bulk export
      - Includes transcript, quizzes, metadata
      - Download as .zip for bulk
    acceptance_criteria:
      - Markdown properly formatted
      - Bulk export works
      - Zip download functional

  - id: S016
    title: Notion Integration
    epic: E5
    points: 8
    priority: should_have
    status: not_started
    sprint: 7
    depends_on: [S015]
    description: |
      Export content directly to Notion database.
      - OAuth connection to Notion
      - Select target database
      - One-click export
    acceptance_criteria:
      - Notion OAuth works
      - Database selection works
      - Content appears in Notion
      - No duplicates on re-export

  # --- Epic 6: User Management ---
  - id: S018
    title: User Sign Up
    epic: E6
    points: 5
    priority: must_have
    status: completed
    sprint: 1
    description: |
      User registration system.
      - Email + password signup
      - Google OAuth signup
      - Email verification
      - Free trial starts (14 days)
    acceptance_criteria:
      - Both signup methods work
      - Email verification sent
      - Trial period tracked
      - User can login after signup

  - id: S019
    title: Subscription Management
    epic: E6
    points: 8
    priority: must_have
    status: completed
    sprint: 5
    depends_on: [S018]
    description: |
      Stripe integration for subscriptions.
      - Stripe Checkout for payment
      - Monthly ($9) and yearly ($90) options
      - Auto-renewal
    acceptance_criteria:
      - Checkout flow works
      - Subscription created in Stripe
      - User status updated in app
      - Email confirmation sent

  - id: S020
    title: Billing Portal
    epic: E6
    points: 3
    priority: should_have
    status: completed
    sprint: 6
    depends_on: [S019]
    description: |
      Access to Stripe Customer Portal.
      - View billing history
      - Update payment method
      - Cancel subscription
    acceptance_criteria:
      - Portal link works
      - User can manage subscription
      - Changes reflected in app

