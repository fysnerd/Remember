# ============================================================================
# NOTES
# ============================================================================

notes: |
  ## Architecture Decisions (v1.1)
  - Web App only (no Chrome Extension)
  - YouTube: youtube-transcript-api (FREE) for subtitles
  - Spotify: RSS feed → Whisper API ($0.36/hour)
  - Quiz generation: GPT-4 or Claude

  ## MVP Definition (Sprints 1-5)
  - User can sign up and connect YouTube + Spotify
  - Content syncs automatically
  - User selects content to quiz
  - Transcripts generated (YouTube free, Spotify paid)
  - AI generates quizzes
  - Spaced repetition review system
  - Daily reminders and streaks
  - Stripe subscription for Pro plan

  ## Post-MVP (Sprints 6-7)
  - Search & filter content
  - Auto-tagging
  - Markdown export
  - Notion integration
  - Billing portal

  ## Excluded from v1
  - Mobile app (future)
  - Instagram/TikTok (future - needs scraping)
  - Twitter (API too expensive)
  - Team features
  - Obsidian integration (could add later)
